<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Tetris vs FPS - A competitive web game where a Tetris player battles an FPS player in real-time" />
  <title>Tetris vs FPS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050810;
    }
    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="global-timer" style="position: absolute; top: 12px; left: 50%; transform: translateX(-50%); color: #445566; font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: bold; z-index: 9999; pointer-events: none; display: none;">00:00</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
